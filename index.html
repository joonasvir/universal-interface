<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#ffffff">
  <title>Universal interface</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="phone" id="phone">
    <div class="phone-screen">
      <div class="status-bar">
        <span class="status-time">9:41</span>
        <span class="status-indicators" aria-hidden="true">
          <svg class="si-signal" viewBox="0 0 18 12" width="18" height="12"><rect x="0"  y="8"  width="3" height="4" rx="1"/><rect x="5"  y="5"  width="3" height="7" rx="1"/><rect x="10" y="2"  width="3" height="10" rx="1"/><rect x="15" y="0"  width="3" height="12" rx="1" opacity="0.35"/></svg>
          <svg class="si-wifi" viewBox="0 0 16 12" width="16" height="12"><path d="M8 11.5a1 1 0 100-2 1 1 0 000 2zM3.5 7.2a6.5 6.5 0 019 0M1 4.6a10 10 0 0114 0" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none"/></svg>
          <svg class="si-battery" viewBox="0 0 25 12" width="25" height="12"><rect x="0.5" y="0.5" width="22" height="11" rx="2.5" stroke="currentColor" fill="none" opacity="0.4"/><rect x="23" y="4" width="1.5" height="4" rx="0.5" fill="currentColor" opacity="0.4"/><rect x="2" y="2" width="18" height="8" rx="1.5" fill="currentColor"/></svg>
        </span>
      </div>
      <div class="island" aria-hidden="true"></div>

      <main class="app" id="app">
        <section class="chat" id="chat" aria-label="Conversation">
          <div class="empty" id="empty">
            <h1>Universal&nbsp;interface</h1>
            <p>Ask anything. Visual answers expand on tap, pull down to collapse.</p>
          </div>
        </section>

        <div class="composer-area" id="composerArea">
          <div class="suggestions" id="suggestions">
            <button class="chip" data-prompt="Find me a place to stay in Miami next week">Place to stay in Miami</button>
            <button class="chip" data-prompt="Quick dinner ideas for tonight">Dinner ideas tonight</button>
            <button class="chip" data-prompt="A film I should watch tonight">Film for tonight</button>
            <button class="chip" data-prompt="A city to visit on a long weekend">City to visit</button>
            <button class="chip" data-prompt="Best running shoes under $200">Running shoes</button>
            <button class="chip" data-prompt="Top rated hotels in Tokyo">Hotels in Tokyo</button>
          </div>
          <form class="composer" id="composer" autocomplete="off">
            <input id="input" type="text" placeholder="Ask anything…" enterkeyhint="send" />
            <button class="send" type="submit" aria-label="Send" disabled>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M12 19V5M12 5L5 12M12 5l7 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </form>
        </div>
      </main>

      <div class="home-indicator" aria-hidden="true"></div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
